apiVersion: v1
kind: Service
metadata:
  name: medflow-backend
  namespace: medflow
spec:
  type: NodePort
  selector:
    app: medflow-backend
  ports:
    - protocol: TCP
      port: 8000        # inside the cluster
      targetPort: 8000  # container port
      nodePort: 30081   # external port on your minikube
  
