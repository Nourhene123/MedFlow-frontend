apiVersion: apps/v1
kind: Deployment
metadata:
  name: medflow-backend
  namespace: medflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medflow-backend
  template:
    metadata:
      labels:
        app: medflow-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: medflow-backend
          image: badiimsalmi7/med-flow-server:latest 
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: medflow-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: medflow-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medflow-secret
                  key: DATABASE_PASSWORD
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: medflow-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: medflow-config
                  key: DATABASE_PORT 