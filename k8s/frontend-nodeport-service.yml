apiVersion: v1
kind: Service
metadata:
  name: medflow-frontend
  namespace: medflow
spec:
  type: NodePort
  selector:
    app: medflow-frontend
  ports:
    - protocol: TCP
      port: 3000        # inside the cluster
      targetPort: 30000  # container port
      nodePort: 30082   # external port on your minikube
  
